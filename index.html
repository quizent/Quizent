<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QUIZENT - Centralized CBT Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Auth Card */
        .auth-card {
            background: white;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .navbar {
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .course-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .course-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .exam-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
        }
        .question-text { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        .option {
            display: block;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
        }
        .option:hover { background: #f0f0f0; }
        .option input { margin-right: 10px; }
        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            width: 600px;
            max-height: 80%;
            overflow-y: auto;
        }
        .result-correct { border-left: 4px solid #10b981; background: rgba(16,185,129,0.1); padding: 10px; margin: 10px 0; }
        .result-wrong { border-left: 4px solid #ef4444; background: rgba(239,68,68,0.1); padding: 10px; margin: 10px 0; }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s;
        }
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .timer { font-size: 12px; padding: 5px 10px; top: 10px; right: 10px; }
            button { padding: 8px 16px; font-size: 14px; }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== GLOBAL DATA STORAGE ====================
        // This is the CENTRAL data structure that all users will see
        let currentUser = null;
        let currentExam = null;
        let currentBatch = 1;
        let currentBatchQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let timerInterval = null;
        let timeLeft = 0;
        
        // CENTRAL DATABASE - This is what all users see
        let centralExams = [];
        let centralQuestions = {};
        
        // Default data
        const defaultExams = [
            { id: 1, title: "Mathematics 101", batchDuration: 5, totalQuestions: 5, batches: 1, questionsPerBatch: 5 },
            { id: 2, title: "Physics Fundamentals", batchDuration: 5, totalQuestions: 3, batches: 1, questionsPerBatch: 3 },
            { id: 3, title: "Computer Science Basics", batchDuration: 5, totalQuestions: 3, batches: 1, questionsPerBatch: 3 }
        ];
        
        const defaultQuestions = {
            1: [
                { id: 1, text: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 },
                { id: 2, text: "What is 5 × 3?", options: ["10", "12", "15", "18"], correct: 2 },
                { id: 3, text: "What is 10 - 4?", options: ["4", "5", "6", "7"], correct: 2 },
                { id: 4, text: "What is 20 ÷ 4?", options: ["4", "5", "6", "7"], correct: 1 },
                { id: 5, text: "What is 8 + 7?", options: ["13", "14", "15", "16"], correct: 2 }
            ],
            2: [
                { id: 1, text: "What is Newton's First Law?", options: ["Inertia", "F=ma", "Action-Reaction", "Gravity"], correct: 0 },
                { id: 2, text: "What is the unit of force?", options: ["Joule", "Watt", "Newton", "Pascal"], correct: 2 },
                { id: 3, text: "What is acceleration due to gravity?", options: ["9.8 m/s²", "10 m/s²", "8.9 m/s²", "9.5 m/s²"], correct: 0 }
            ],
            3: [
                { id: 1, text: "What does CPU stand for?", options: ["Central Processing Unit", "Computer Personal Unit", "Central Program Unit", "Core Processing Unit"], correct: 0 },
                { id: 2, text: "What is JavaScript used for?", options: ["Styling", "Structure", "Interactivity", "Database"], correct: 2 },
                { id: 3, text: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Markup Language", "Home Tool Markup Language"], correct: 0 }
            ]
        };
        
        // Students database
        const students = {};
        for (let i = 1; i <= 300; i++) {
            students[`SCI24ICH${String(i).padStart(3, '0')}`] = { password: "password" };
            students[`SCI25PSC${String(i).padStart(3, '0')}`] = { password: "password" };
        }
        
        // ==================== CENTRAL DATA MANAGEMENT ====================
        // Load central data from localStorage (this is the "database" that syncs across users)
        function loadCentralData() {
            const savedExams = localStorage.getItem('quizent_central_exams');
            const savedQuestions = localStorage.getItem('quizent_central_questions');
            
            if (savedExams) {
                centralExams = JSON.parse(savedExams);
            } else {
                centralExams = JSON.parse(JSON.stringify(defaultExams));
                localStorage.setItem('quizent_central_exams', JSON.stringify(centralExams));
            }
            
            if (savedQuestions) {
                centralQuestions = JSON.parse(savedQuestions);
            } else {
                centralQuestions = JSON.parse(JSON.stringify(defaultQuestions));
                localStorage.setItem('quizent_central_questions', JSON.stringify(centralQuestions));
            }
        }
        
        // Save central data (this updates for ALL users because it's in localStorage)
        function saveCentralData() {
            localStorage.setItem('quizent_central_exams', JSON.stringify(centralExams));
            localStorage.setItem('quizent_central_questions', JSON.stringify(centralQuestions));
            showToast("✅ Changes saved to central database!", "success");
        }
        
        // ==================== UTILITY FUNCTIONS ====================
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#f59e0b';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function startTimer(minutes) {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = minutes * 60;
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showToast("⏰ Time's up! Submitting...", "warning");
                    submitBatch();
                } else {
                    timeLeft--;
                    const timerEl = document.getElementById('examTimer');
                    if (timerEl) {
                        const mins = Math.floor(timeLeft / 60);
                        const secs = timeLeft % 60;
                        timerEl.textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
                    }
                }
            }, 1000);
        }
        
        function saveUserProgress() {
            const progress = {
                examId: currentExam.id,
                batch: currentBatch,
                answers: userAnswers,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem(`quizent_progress_${currentUser.matric}_${currentExam.id}`, JSON.stringify(progress));
        }
        
        function loadUserProgress() {
            const saved = localStorage.getItem(`quizent_progress_${currentUser.matric}_${currentExam.id}`);
            if (saved) {
                const progress = JSON.parse(saved);
                currentBatch = progress.batch;
                userAnswers = progress.answers;
                return true;
            }
            return false;
        }
        
        // ==================== JSON UPLOAD (ADMIN) ====================
        function uploadQuestionsJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                const text = await file.text();
                try {
                    const data = JSON.parse(text);
                    const examId = parseInt(prompt("Enter Exam ID to add questions to:"));
                    
                    let exam = centralExams.find(e => e.id === examId);
                    if (!exam) {
                        const examName = prompt(`Exam ${examId} not found. Create new exam? Enter name:`);
                        if (examName) {
                            centralExams.push({
                                id: examId,
                                title: examName,
                                batchDuration: 15,
                                totalQuestions: 0,
                                batches: 1,
                                questionsPerBatch: 10
                            });
                            centralQuestions[examId] = [];
                            exam = centralExams.find(e => e.id === examId);
                        } else {
                            showToast("Exam not found!", "error");
                            return;
                        }
                    }
                    
                    if (!centralQuestions[examId]) centralQuestions[examId] = [];
                    
                    let newQuestions = data.questions || data;
                    if (!Array.isArray(newQuestions)) {
                        showToast("Invalid format! Need array of questions", "error");
                        return;
                    }
                    
                    // Validate questions
                    for (let q of newQuestions) {
                        if (!q.text) { showToast("Each question needs 'text'", "error"); return; }
                        if (!q.options || q.options.length !== 4) { showToast("Each question needs 4 options", "error"); return; }
                        if (q.correct === undefined || q.correct < 0 || q.correct > 3) { showToast("Correct answer must be 0-3", "error"); return; }
                    }
                    
                    const startId = centralQuestions[examId].length + 1;
                    newQuestions.forEach((q, idx) => { q.id = startId + idx; });
                    
                    centralQuestions[examId] = [...centralQuestions[examId], ...newQuestions];
                    exam.totalQuestions = centralQuestions[examId].length;
                    exam.batches = Math.ceil(exam.totalQuestions / exam.questionsPerBatch);
                    
                    saveCentralData();
                    showToast(`✅ Added ${newQuestions.length} questions to "${exam.title}"! Total: ${exam.totalQuestions} questions`, "success");
                    
                    if (currentUser?.role === 'admin') renderAdminPanel();
                    
                } catch (error) {
                    showToast("Error parsing JSON! Check format.", "error");
                }
            };
            input.click();
        }
        
        // ==================== EXAM FUNCTIONS ====================
        function startExam(examId) {
            const exam = centralExams.find(e => e.id === examId);
            if (!exam) return;
            
            const examQuestions = centralQuestions[examId] || [];
            if (examQuestions.length === 0) {
                showToast("No questions available for this exam!", "error");
                return;
            }
            
            currentExam = exam;
            currentBatch = 1;
            currentQuestionIndex = 0;
            userAnswers = {};
            
            // Load saved progress if any
            loadUserProgress();
            
            // Get current batch questions
            const startIdx = (currentBatch - 1) * exam.questionsPerBatch;
            currentBatchQuestions = examQuestions.slice(startIdx, startIdx + exam.questionsPerBatch);
            
            startTimer(exam.batchDuration);
            render();
        }
        
        function saveAnswer(questionId, answer) {
            userAnswers[questionId] = answer;
            saveUserProgress();
        }
        
        function nextQuestion() {
            if (currentQuestionIndex < currentBatchQuestions.length - 1) {
                currentQuestionIndex++;
                render();
            }
        }
        
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                render();
            }
        }
        
        function submitBatch() {
            if (timerInterval) clearInterval(timerInterval);
            
            // Calculate score for this batch
            let score = 0;
            const results = [];
            for (let q of currentBatchQuestions) {
                const userAnswer = userAnswers[q.id];
                const isCorrect = (userAnswer === q.correct);
                if (isCorrect) score++;
                results.push({
                    text: q.text,
                    userAnswer: userAnswer !== undefined ? q.options[userAnswer] : "Not answered",
                    correctAnswer: q.options[q.correct],
                    isCorrect: isCorrect
                });
            }
            
            const percentage = (score / currentBatchQuestions.length) * 100;
            
            // Save batch result
            const batchResult = {
                batch: currentBatch,
                score: score,
                total: currentBatchQuestions.length,
                percentage: percentage,
                results: results,
                date: new Date().toISOString()
            };
            
            const savedResults = localStorage.getItem(`quizent_results_${currentUser.matric}_${currentExam.id}`);
            const allResults = savedResults ? JSON.parse(savedResults) : [];
            allResults.push(batchResult);
            localStorage.setItem(`quizent_results_${currentUser.matric}_${currentExam.id}`, JSON.stringify(allResults));
            
            // Show results modal
            showResultsModal(results, score, percentage);
        }
        
        function showResultsModal(results, score, percentage) {
            const modalHtml = `
                <div class="modal" id="resultsModal">
                    <div class="modal-content">
                        <h2>📊 Batch ${currentBatch} Results</h2>
                        <div class="score-circle">${score}/${results.length}</div>
                        <p style="text-align:center; font-size:18px;">${percentage.toFixed(1)}%</p>
                        <h3>📝 Corrections:</h3>
                        ${results.map((r, i) => `
                            <div class="${r.isCorrect ? 'result-correct' : 'result-wrong'}">
                                <strong>Q${i+1}: ${r.text}</strong><br>
                                Your answer: ${r.userAnswer}<br>
                                Correct: ${r.correctAnswer}
                            </div>
                        `).join('')}
                        <button onclick="closeResultsAndContinue()" style="margin-top:20px; width:100%;">Continue</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        function closeResultsAndContinue() {
            const modal = document.getElementById('resultsModal');
            if (modal) modal.remove();
            
            const totalBatches = Math.ceil(currentExam.totalQuestions / currentExam.questionsPerBatch);
            
            if (currentBatch < totalBatches) {
                currentBatch++;
                currentQuestionIndex = 0;
                userAnswers = {};
                
                const startIdx = (currentBatch - 1) * currentExam.questionsPerBatch;
                currentBatchQuestions = centralQuestions[currentExam.id].slice(startIdx, startIdx + currentExam.questionsPerBatch);
                
                startTimer(currentExam.batchDuration);
                render();
                showToast(`Starting Batch ${currentBatch} of ${totalBatches}`, "success");
            } else {
                // Exam completed - show final results
                showFinalResults();
                currentExam = null;
                render();
            }
        }
        
        function showFinalResults() {
            const savedResults = localStorage.getItem(`quizent_results_${currentUser.matric}_${currentExam.id}`);
            const allResults = savedResults ? JSON.parse(savedResults) : [];
            
            let totalScore = 0;
            let totalQuestions = 0;
            allResults.forEach(batch => {
                totalScore += batch.score;
                totalQuestions += batch.total;
            });
            
            const percentage = (totalScore / totalQuestions) * 100;
            let grade = '';
            if (percentage >= 80) grade = 'A';
            else if (percentage >= 70) grade = 'B';
            else if (percentage >= 60) grade = 'C';
            else if (percentage >= 50) grade = 'D';
            else grade = 'F';
            
            const modalHtml = `
                <div class="modal" id="finalModal">
                    <div class="modal-content">
                        <h2>🎉 Exam Complete!</h2>
                        <h3>${currentExam.title}</h3>
                        <div class="score-circle">${totalScore}/${totalQuestions}</div>
                        <p style="text-align:center; font-size:24px; font-weight:bold;">Grade: ${grade}</p>
                        <p style="text-align:center;">${percentage.toFixed(1)}%</p>
                        <button onclick="closeFinalResults()" style="margin-top:20px; width:100%;">Return to Dashboard</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }
        
        function closeFinalResults() {
            const modal = document.getElementById('finalModal');
            if (modal) modal.remove();
            render();
        }
        
        // ==================== ADMIN FUNCTIONS ====================
        function addExam() {
            const title = prompt("Enter exam title:");
            if (!title) return;
            const batchDuration = parseInt(prompt("Duration per batch (minutes):", "15"));
            const questionsPerBatch = parseInt(prompt("Questions per batch:", "10"));
            
            const newId = centralExams.length + 1;
            centralExams.push({
                id: newId,
                title: title,
                batchDuration: batchDuration || 15,
                totalQuestions: 0,
                batches: 0,
                questionsPerBatch: questionsPerBatch || 10
            });
            centralQuestions[newId] = [];
            saveCentralData();
            renderAdminPanel();
            showToast(`✅ Exam "${title}" added for ALL users!`, "success");
        }
        
        function deleteExam(examId) {
            if (confirm("Delete this exam? This will affect ALL 600 students!")) {
                centralExams = centralExams.filter(e => e.id !== examId);
                delete centralQuestions[examId];
                saveCentralData();
                renderAdminPanel();
                showToast(`✅ Exam deleted for ALL users!`, "success");
            }
        }
        
        function viewQuestions(examId) {
            const qs = centralQuestions[examId] || [];
            if (qs.length === 0) {
                alert("No questions in this exam yet.");
                return;
            }
            let msg = `Questions (${qs.length} total):\n\n`;
            qs.forEach((q, i) => {
                msg += `${i+1}. ${q.text}\n   Correct: ${String.fromCharCode(65+q.correct)}\n\n`;
            });
            alert(msg);
        }
        
        function editExam(examId) {
            const exam = centralExams.find(e => e.id === examId);
            if (!exam) return;
            const newTitle = prompt("New title:", exam.title);
            if (newTitle) exam.title = newTitle;
            const newDuration = parseInt(prompt("New duration per batch (minutes):", exam.batchDuration));
            if (newDuration) exam.batchDuration = newDuration;
            saveCentralData();
            renderAdminPanel();
            showToast(`✅ Exam updated for ALL users!`, "success");
        }
        
        function exportResults() {
            let csv = "Student,Exam,Batch,Score,Percentage,Date\n";
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('quizent_results_')) {
                    const parts = key.split('_');
                    const student = parts[2];
                    const examId = parts[3];
                    const exam = centralExams.find(e => e.id == examId);
                    const results = JSON.parse(localStorage.getItem(key));
                    for (let r of results) {
                        csv += `"${student}","${exam?.title || examId}","${r.batch}","${r.score}/${r.total}","${r.percentage.toFixed(1)}%","${r.date}"\n`;
                    }
                }
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quizent_results_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("Results exported!");
        }
        
        // ==================== RENDER FUNCTIONS ====================
        function render() {
            const app = document.getElementById('app');
            if (!currentUser) renderAuth(app);
            else if (currentUser.role === 'admin') renderAdminPanel(app);
            else if (currentExam) renderExamInterface(app);
            else renderStudentDashboard(app);
        }
        
        function renderAuth(container) {
            container.innerHTML = `
                <div class="container">
                    <div class="auth-card">
                        <h1>🎯 QUIZENT</h1>
                        <p>Centralized CBT Platform</p>
                        <form id="loginForm">
                            <input type="text" id="matric" placeholder="Matric Number (e.g., SCI24ICH001)" required>
                            <input type="password" id="password" placeholder="Password" required>
                            <button type="submit">Login</button>
                        </form>
                        <button onclick="showAdminLogin()" style="background:#6b7280; margin-top:10px;">Admin Login</button>
                    </div>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const matric = document.getElementById('matric').value.toUpperCase();
                const password = document.getElementById('password').value;
                if (students[matric] && students[matric].password === password) {
                    currentUser = { matric, role: 'student' };
                    localStorage.setItem('quizent_current_user', JSON.stringify(currentUser));
                    render();
                    showToast(`Welcome ${matric}!`);
                } else showToast("Invalid credentials!", "error");
            });
        }
        
        function showAdminLogin() {
            const pwd = prompt("Admin Password:");
            if (pwd === "admin123") {
                currentUser = { role: 'admin', name: 'Admin' };
                localStorage.setItem('quizent_current_user', JSON.stringify(currentUser));
                render();
                showToast("Welcome Admin!");
            } else showToast("Wrong password!", "error");
        }
        
        function renderStudentDashboard(container) {
            container.innerHTML = `
                <div class="container">
                    <div class="navbar">
                        <h2>🎯 QUIZENT</h2>
                        <div>
                            <span>👋 ${currentUser.matric}</span>
                            <button onclick="logout()" class="btn-danger">Logout</button>
                        </div>
                    </div>
                    <h2>📚 Available Exams</h2>
                    ${centralExams.map(exam => `
                        <div class="course-card" onclick="startExam(${exam.id})">
                            <h3>📖 ${exam.title}</h3>
                            <p>⏱️ ${exam.batchDuration} min per batch</p>
                            <p>📝 ${exam.totalQuestions} questions</p>
                            <p>📦 ${Math.ceil(exam.totalQuestions / exam.questionsPerBatch)} batches</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderExamInterface(container) {
            const q = currentBatchQuestions[currentQuestionIndex];
            if (!q) return;
            
            const answeredCount = Object.keys(userAnswers).length;
            
            container.innerHTML = `
                <div id="examTimer" class="timer">⏱️ ${currentExam.batchDuration}:00</div>
                <div class="container">
                    <div class="exam-container">
                        <div style="margin-bottom:20px">
                            <span style="background:#667eea; padding:5px 12px; border-radius:20px; color:white">
                                Batch ${currentBatch} of ${Math.ceil(currentExam.totalQuestions / currentExam.questionsPerBatch)}
                            </span>
                            <span style="margin-left:10px">Progress: ${answeredCount}/${currentBatchQuestions.length}</span>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${(answeredCount/currentBatchQuestions.length)*100}%"></div>
                            </div>
                        </div>
                        
                        <div class="question-text">
                            Question ${currentQuestionIndex + 1} of ${currentBatchQuestions.length}<br><br>
                            ${q.text}
                        </div>
                        
                        <div>
                            ${q.options.map((opt, idx) => `
                                <label class="option">
                                    <input type="radio" name="question" value="${idx}" ${userAnswers[q.id] == idx ? 'checked' : ''}>
                                    ${String.fromCharCode(65+idx)}. ${opt}
                                </label>
                            `).join('')}
                        </div>
                        
                        <div style="margin-top:20px">
                            <button onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>← Previous</button>
                            <button onclick="nextQuestion()">Next →</button>
                            <button onclick="submitBatch()" class="btn-success">✅ Submit Batch</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('input[name="question"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    saveAnswer(q.id, parseInt(e.target.value));
                });
            });
        }
        
        function renderAdminPanel(container) {
            container.innerHTML = `
                <div class="container">
                    <div class="navbar">
                        <h2>🎯 QUIZENT Admin</h2>
                        <div>
                            <button onclick="logout()" class="btn-danger">Logout</button>
                        </div>
                    </div>
                    <div style="background:white; padding:20px; border-radius:15px;">
                        <h2>📊 Admin Dashboard</h2>
                        <p style="color:#666; margin-bottom:15px;">⚠️ Changes affect ALL 600 students!</p>
                        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
                            <button onclick="uploadQuestionsJSON()" style="background:#3b82f6;">📤 Upload Questions (JSON)</button>
                            <button onclick="addExam()">+ Add Exam</button>
                            <button onclick="exportResults()" style="background:#10b981;">📥 Export Results</button>
                        </div>
                        <hr style="margin:20px 0">
                        <div id="examsList"></div>
                    </div>
                </div>
            `;
            
            const examsList = document.getElementById('examsList');
            examsList.innerHTML = centralExams.map(exam => `
                <div style="border:1px solid #ddd; padding:15px; margin:10px 0; border-radius:10px;">
                    <h3>📚 ${exam.title}</h3>
                    <p>Questions: ${exam.totalQuestions} | Duration: ${exam.batchDuration} min/batch</p>
                    <p>Batches: ${Math.ceil(exam.totalQuestions / exam.questionsPerBatch)}</p>
                    <button onclick="viewQuestions(${exam.id})">View Questions</button>
                    <button onclick="editExam(${exam.id})">Edit</button>
                    <button onclick="deleteExam(${exam.id})" style="background:#ef4444;">Delete</button>
                </div>
            `).join('');
        }
        
        function logout() {
            currentUser = null;
            currentExam = null;
            if (timerInterval) clearInterval(timerInterval);
            localStorage.removeItem('quizent_current_user');
            render();
            showToast("Logged out!");
        }
        
        // Make functions global
        window.startExam = startExam;
        window.nextQuestion = nextQuestion;
        window.prevQuestion = prevQuestion;
        window.submitBatch = submitBatch;
        window.logout = logout;
        window.showAdminLogin = showAdminLogin;
        window.uploadQuestionsJSON = uploadQuestionsJSON;
        window.addExam = addExam;
        window.deleteExam = deleteExam;
        window.viewQuestions = viewQuestions;
        window.editExam = editExam;
        window.exportResults = exportResults;
        window.closeResultsAndContinue = closeResultsAndContinue;
        window.closeFinalResults = closeFinalResults;
        
        // Initialize
        loadCentralData();
        
        // Check for existing session
        const savedUser = localStorage.getItem('quizent_current_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            render();
        } else {
            render();
        }
    </script>
</body>
</html>
